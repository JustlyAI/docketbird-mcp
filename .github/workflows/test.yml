name: Test

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: Lint
        run: ruff check .

      - name: Check manifest drift
        run: |
          python - <<'EOF'
          import tomllib, sys
          py = set(tomllib.load(open("pyproject.toml", "rb"))["project"]["dependencies"])
          req = set(l.strip() for l in open("requirements.txt", encoding="utf-8") if l.strip() and not l.startswith("#"))
          missing = py ^ req
          if missing:
              print(f"Manifest drift between pyproject.toml and requirements.txt: {missing}")
              sys.exit(1)
          print("Manifests in sync")
          EOF
