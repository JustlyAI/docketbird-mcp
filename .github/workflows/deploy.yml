name: Deploy DocketBird MCP Server

on:
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: Lint
        run: ruff check .

      - name: Check manifest drift
        run: |
          python - <<'EOF'
          import tomllib, sys
          py = set(tomllib.load(open("pyproject.toml", "rb"))["project"]["dependencies"])
          req = set(l.strip() for l in open("requirements.txt", encoding="utf-8") if l.strip() and not l.startswith("#"))
          missing = py ^ req
          if missing:
              print(f"Manifest drift between pyproject.toml and requirements.txt: {missing}")
              sys.exit(1)
          print("Manifests in sync")
          EOF

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            laurentsw/docketbird-mcp:latest
            laurentsw/docketbird-mcp:${{ github.sha }}

      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull laurentsw/docketbird-mcp:latest
            docker stop docketbird-mcp || true
            docker rm docketbird-mcp || true
            docker run -d \
              --name docketbird-mcp \
              --restart=always \
              -e SERVER_URL="https://app.docketbird-mcp.com" \
              -e GIT_SHA="${{ github.sha }}" \
              -e SERVICE_TOKEN="${{ secrets.SERVICE_TOKEN }}" \
              -e SERVICE_DOCKETBIRD_API_KEY="${{ secrets.SERVICE_DOCKETBIRD_API_KEY }}" \
              -v docketbird-data:/app/data \
              -p 127.0.0.1:8040:8080 \
              --health-cmd="python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\"" \
              --health-interval=30s \
              laurentsw/docketbird-mcp:latest

            # Wait for healthy status
            sleep 10
            docker ps --filter "name=docketbird-mcp" --format "{{.Status}}"

            # Verify health endpoint
            curl -f http://localhost:8040/health || echo "Health check pending..."
